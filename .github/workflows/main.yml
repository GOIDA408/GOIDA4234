
name: Update VPN subscriptions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PARSER_OWNER: GOIDA408
  PARSER_REPO: PARSER

jobs:
  update-sub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout subscription repo
        uses: actions/checkout@v4

      - name: Download PARSER code
        run: |
          mkdir -p parser-src
          BASE="https://raw.githubusercontent.com/${PARSER_OWNER}/${PARSER_REPO}/main"
          echo "Fetching from $BASE"
          curl -fsSL -o parser-src/parser.py "$BASE/parser.py"
          curl -fsSL -o parser-src/sources.txt "$BASE/sources.txt"
          curl -fsSL -o parser-src/requirements.txt "$BASE/requirements.txt"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        working-directory: parser-src
        run: pip install -r requirements.txt

      - name: Run parser (VLESS checker)
        working-directory: parser-src
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u parser.py

      - name: Publish to GOIDA4234
        run: |
          cp parser-src/name.txt parser-src/whitelist.txt parser-src/foreign.txt parser-src/sub.txt parser-src/sub_raw.txt .
          if [ ! -s name.txt ]; then
            echo "::error::No working VLESS servers found"
            exit 1
          fi
          if grep -qi "security=none" name.txt; then
            echo "::error::Invalid security=none links detected, aborting"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add name.txt whitelist.txt foreign.txt sub.txt sub_raw.txt
          git diff --staged --quiet || git commit -m "Update VLESS subscriptions"
          git push
